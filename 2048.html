<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>2048 小游戏</title>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body {
    font-family: 'Segoe UI', 'PingFang SC', Arial, sans-serif;
    display: flex;
    justify-content: center;
    align-items: center;
    min-height: 100vh;
    background: #faf8ef;
  }
  .container {
    text-align: center;
    padding: 20px;
  }
  h1 {
    font-size: 48px;
    color: #776e65;
    margin-bottom: 10px;
    font-weight: bold;
  }
  .header {
    display: flex;
    justify-content: space-between;
    align-items: center;
    margin-bottom: 16px;
    max-width: 500px;
  }
  .score-box {
    background: #bbada0;
    color: #fff;
    padding: 8px 20px;
    border-radius: 6px;
    font-weight: bold;
    font-size: 18px;
  }
  .score-box span { font-size: 26px; display: block; }
  .btn-restart {
    background: #8f7a66;
    color: #fff;
    border: none;
    padding: 10px 20px;
    border-radius: 6px;
    font-size: 16px;
    font-weight: bold;
    cursor: pointer;
    transition: background 0.2s;
  }
  .btn-restart:hover { background: #9f8b77; }
  .grid-container {
    position: relative;
    background: #bbada0;
    border-radius: 8px;
    padding: 12px;
    display: inline-block;
  }
  .grid-background {
    display: grid;
    grid-template-columns: repeat(4, 1fr);
    gap: 12px;
  }
  .grid-cell {
    width: 100px;
    height: 100px;
    background: rgba(238, 228, 218, 0.35);
    border-radius: 6px;
  }
  .tile-container {
    position: absolute;
    top: 12px;
    left: 12px;
    right: 12px;
    bottom: 12px;
  }
  .tile {
    position: absolute;
    width: 100px;
    height: 100px;
    border-radius: 6px;
    display: flex;
    justify-content: center;
    align-items: center;
    font-size: 42px;
    font-weight: bold;
    transition: top 0.1s ease, left 0.1s ease;
    animation: appear 0.2s ease;
  }
  .tile.merged { animation: merge 0.2s ease; }
  @keyframes appear {
    0% { transform: scale(0); opacity: 0.5; }
    100% { transform: scale(1); opacity: 1; }
  }
  @keyframes merge {
    0% { transform: scale(1.2); }
    100% { transform: scale(1); }
  }
  .tile-2    { background: #eee4da; color: #776e65; }
  .tile-4    { background: #ede0c8; color: #776e65; }
  .tile-8    { background: #f2b179; color: #f9f6f2; }
  .tile-16   { background: #f59563; color: #f9f6f2; }
  .tile-32   { background: #f67c5f; color: #f9f6f2; }
  .tile-64   { background: #f65e3b; color: #f9f6f2; }
  .tile-128  { background: #edcf72; color: #f9f6f2; font-size: 36px; }
  .tile-256  { background: #edcc61; color: #f9f6f2; font-size: 36px; }
  .tile-512  { background: #edc850; color: #f9f6f2; font-size: 36px; }
  .tile-1024 { background: #edc53f; color: #f9f6f2; font-size: 30px; }
  .tile-2048 { background: #edc22e; color: #f9f6f2; font-size: 30px; }
  .tile-super { background: #3c3a32; color: #f9f6f2; font-size: 28px; }

  .game-over-overlay {
    position: absolute;
    top: 0; left: 0; right: 0; bottom: 0;
    background: rgba(238, 228, 218, 0.73);
    border-radius: 8px;
    display: none;
    justify-content: center;
    align-items: center;
    flex-direction: column;
    z-index: 10;
  }
  .game-over-overlay.show { display: flex; }
  .game-over-overlay h2 { font-size: 40px; color: #776e65; margin-bottom: 16px; }
  .game-over-overlay button {
    background: #8f7a66;
    color: #fff;
    border: none;
    padding: 12px 24px;
    border-radius: 6px;
    font-size: 18px;
    font-weight: bold;
    cursor: pointer;
  }

  .subtitle { color: #776e65; font-size: 14px; margin-top: 10px; }
  .subtitle kbd {
    background: #eee4da;
    padding: 2px 8px;
    border-radius: 4px;
    font-size: 13px;
  }
</style>
</head>
<body>

<div class="container">
  <h1>2048</h1>
  <div class="header" style="width:500px">
    <div class="score-box">
      分数
      <span id="score">0</span>
    </div>
    <div class="score-box">
      最高分
      <span id="best">0</span>
    </div>
    <button class="btn-restart" onclick="restart()">↻ 新游戏</button>
  </div>

  <div class="grid-container" id="grid-container">
    <!-- 4x4 背景格子 -->
    <div class="grid-background">
      <div class="grid-cell"></div><div class="grid-cell"></div>
      <div class="grid-cell"></div><div class="grid-cell"></div>
      <div class="grid-cell"></div><div class="grid-cell"></div>
      <div class="grid-cell"></div><div class="grid-cell"></div>
      <div class="grid-cell"></div><div class="grid-cell"></div>
      <div class="grid-cell"></div><div class="grid-cell"></div>
      <div class="grid-cell"></div><div class="grid-cell"></div>
      <div class="grid-cell"></div><div class="grid-cell"></div>
    </div>

    <!-- 动态方块 -->
    <div class="tile-container" id="tile-container"></div>

    <!-- Game Over 遮罩 -->
    <div class="game-over-overlay" id="game-over-overlay">
      <h2>游戏结束！</h2>
      <button onclick="restart()">再来一局</button>
    </div>
  </div>

  <p class="subtitle">
    使用 <kbd>↑</kbd> <kbd>↓</kbd> <kbd>←</kbd> <kbd>→</kbd> 或 <kbd>W</kbd> <kbd>S</kbd> <kbd>A</kbd> <kbd>D</kbd> 控制
  </p>
</div>

<script>
// ----- 核心游戏逻辑 -----
const SIZE = 4;
let grid = [];
let score = 0;
let best = parseInt(localStorage.getItem('best2048')) || 0;
let gameOver = false;

const container = document.getElementById('tile-container');
const scoreEl = document.getElementById('score');
const bestEl = document.getElementById('best');
const overlay = document.getElementById('game-over-overlay');

bestEl.textContent = best;

// 初始化网格
function initGrid() {
  grid = Array.from({ length: SIZE }, () => Array(SIZE).fill(0));
  score = 0;
  gameOver = false;
  overlay.classList.remove('show');
  updateScore();
  addRandomTile();
  addRandomTile();
  render();
}

// 获取空格子
function getEmptyCells() {
  const cells = [];
  for (let r = 0; r < SIZE; r++)
    for (let c = 0; c < SIZE; c++)
      if (grid[r][c] === 0) cells.push([r, c]);
  return cells;
}

// 随机生成 2 或 4
function addRandomTile() {
  const empty = getEmptyCells();
  if (empty.length === 0) return;
  const [r, c] = empty[Math.floor(Math.random() * empty.length)];
  grid[r][c] = Math.random() < 0.9 ? 2 : 4;
}

// 更新分数
function updateScore() {
  scoreEl.textContent = score;
  if (score > best) {
    best = score;
    bestEl.textContent = best;
    localStorage.setItem('best2048', best);
  }
}

// 核心移动逻辑
function move(direction) {
  if (gameOver) return;

  let moved = false;
  const oldScore = score;

  // 转置 + 翻转处理方向
  let board = grid.map(row => [...row]);

  if (direction === 'up') {
    board = rotateLeft(board);
  } else if (direction === 'down') {
    board = rotateRight(board);
  } else if (direction === 'right') {
    board = board.map(row => [...row].reverse());
  }
  // left 不动

  for (let r = 0; r < SIZE; r++) {
    const { row, pts } = slide(board[r]);
    board[r] = row;
    score += pts;
  }

  // 恢复方向
  if (direction === 'up') {
    board = rotateRight(board);
  } else if (direction === 'down') {
    board = rotateLeft(board);
  } else if (direction === 'right') {
    board = board.map(row => [...row].reverse());
  }

  for (let r = 0; r < SIZE; r++)
    for (let c = 0; c < SIZE; c++)
      if (grid[r][c] !== board[r][c]) moved = true;

  if (moved) {
    grid = board;
    addRandomTile();
    updateScore();
    render();
    if (isGameOver()) {
      gameOver = true;
      overlay.classList.add('show');
    }
  }
}

// 单行滑行 + 合并
function slide(row) {
  // 去掉 0
  let arr = row.filter(v => v !== 0);
  let pts = 0;
  // 合并相邻相同
  for (let i = 0; i < arr.length - 1; i++) {
    if (arr[i] === arr[i + 1]) {
      arr[i] *= 2;
      pts += arr[i];
      arr.splice(i + 1, 1);
    }
  }
  // 补 0
  while (arr.length < SIZE) arr.push(0);
  return { row: arr, pts };
}

function rotateLeft(matrix) {
  const n = SIZE;
  const res = Array.from({ length: n }, () => Array(n).fill(0));
  for (let r = 0; r < n; r++)
    for (let c = 0; c < n; c++)
      res[r][c] = matrix[c][n - 1 - r];
  return res;
}

function rotateRight(matrix) {
  const n = SIZE;
  const res = Array.from({ length: n }, () => Array(n).fill(0));
  for (let r = 0; r < n; r++)
    for (let c = 0; c < n; c++)
      res[r][c] = matrix[n - 1 - c][r];
  return res;
}

// 检查是否游戏结束
function isGameOver() {
  // 还有空格
  if (getEmptyCells().length > 0) return false;
  // 检查是否有相邻相同
  for (let r = 0; r < SIZE; r++)
    for (let c = 0; c < SIZE; c++) {
      if (r < SIZE - 1 && grid[r][c] === grid[r + 1][c]) return false;
      if (c < SIZE - 1 && grid[r][c] === grid[r][c + 1]) return false;
    }
  return true;
}

// ----- 渲染 -----
function render() {
  const cellSize = 100;
  const gap = 12;
  container.innerHTML = '';
  for (let r = 0; r < SIZE; r++) {
    for (let c = 0; c < SIZE; c++) {
      const val = grid[r][c];
      if (val === 0) continue;
      const tile = document.createElement('div');
      tile.className = 'tile tile-' + (val <= 2048 ? val : 'super');
      tile.textContent = val;
      tile.style.top = (r * (cellSize + gap)) + 'px';
      tile.style.left = (c * (cellSize + gap)) + 'px';
      tile.style.width = cellSize + 'px';
      tile.style.height = cellSize + 'px';
      container.appendChild(tile);
    }
  }
}

function restart() {
  initGrid();
}

// ----- 键盘事件 -----
document.addEventListener('keydown', (e) => {
  const keyMap = {
    ArrowUp: 'up', ArrowDown: 'down', ArrowLeft: 'left', ArrowRight: 'right',
    w: 'up', W: 'up', s: 'down', S: 'down', a: 'left', A: 'left', d: 'right', D: 'right'
  };
  const dir = keyMap[e.key];
  if (dir) {
    e.preventDefault();
    move(dir);
  }
});

// 触摸滑动支持
let touchStartX = 0, touchStartY = 0;
document.addEventListener('touchstart', (e) => {
  const t = e.touches[0];
  touchStartX = t.clientX;
  touchStartY = t.clientY;
});
document.addEventListener('touchend', (e) => {
  const t = e.changedTouches[0];
  const dx = t.clientX - touchStartX;
  const dy = t.clientY - touchStartY;
  const absDx = Math.abs(dx);
  const absDy = Math.abs(dy);
  if (Math.max(absDx, absDy) < 30) return;
  if (absDx > absDy) {
    move(dx > 0 ? 'right' : 'left');
  } else {
    move(dy > 0 ? 'down' : 'up');
  }
});

// 开始游戏！
initGrid();
</script>
</body>
</html>
